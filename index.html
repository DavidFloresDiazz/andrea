<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Lógico</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(15, 23, 42, 0.76);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --ok: #86efac;
      --bad: #fca5a5;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.12), transparent 28%),
        linear-gradient(135deg, #020617, var(--bg));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      border-radius: 22px;
      padding: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    p {
      color: var(--muted);
      line-height: 1.55;
      margin: 0;
    }

    .rules {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.85);
    }

    .rules ul {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--text);
    }

    .rules li + li { margin-top: 8px; }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    input, button {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.92);
      color: var(--text);
      font-size: 1rem;
    }

    input {
      flex: 1 1 220px;
      padding: 13px 14px;
      outline: none;
    }

    button {
      padding: 13px 16px;
      cursor: pointer;
    }

    .msg {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 600;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    .secret {
      display: none;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .download {
      display: inline-block;
      margin-top: 10px;
      padding: 11px 14px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: #16a34a;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Portal Lógico</h1>
    <p>Resuelve el acertijo y calcula la clave final.</p>

    <section class="rules">
      <p><strong>Acertijo:</strong></p>
      <ul>
        <li>Con los dedos de las manos y los dedos de los pies, con mi polla y los huevos todo suma: </li>
      </ul>
    </section>

    <div class="controls">
      <input id="answer" type="text" placeholder="Introduce la respuesta" autocomplete="off" />
      <button id="check">Comprobar</button>
    </div>

    <div id="msg" class="msg"></div>

    <section id="secret" class="secret">
      <p>Correcto. Acceso concedido.</p>
      <a id="download" class="download" href="Cuarta Carta.pdf" download>Descargar recompensa</a>
    </section>
  </main>

  <script>
    const correctAnswer = '23';
    const answer = document.getElementById('answer');
    const check = document.getElementById('check');
    const msg = document.getElementById('msg');
    const secret = document.getElementById('secret');
    const download = document.getElementById('download');



    function unlock() {
      msg.textContent = 'Respuesta correcta.';
      msg.className = 'msg ok';
      secret.style.display = 'block';
    }

    function fail() {
      msg.textContent = 'Respuesta incorrecta.';
      msg.className = 'msg bad';
      secret.style.display = 'none';
    }

    check.addEventListener('click', () => {
      const value = answer.value.trim();
      if (value === correctAnswer) unlock();
      else fail();
    });

    answer.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') check.click();
    });
  </script>
</body>
</html>
